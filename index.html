<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width">
  <title>Precision — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(25,28,30,.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--s-white); border-radius: var(--r-xl);
      box-shadow: 0 24px 64px -8px rgba(25,28,30,.18);
      padding: 1.75rem; width: 380px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal label { font-size: .78rem; color: var(--tx-muted); display: block; margin-bottom: .3rem; }
    .project-card__delete {
      position: absolute; top: .5rem; right: .5rem;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(25,28,30,.08); border: none; cursor: pointer;
      font-size: .75rem; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .project-card:hover .project-card__delete { opacity: 1; }
    .project-card__delete:hover { background: #fde8e8; }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="/" class="topbar__logo" style="text-decoration:none">Precision</a>
    <nav class="topbar__nav">
      <a href="/">Dashboard</a>
      <a href="/archive">Archivio</a>
    </nav>
    <div class="topbar__avatar">MP</div>
  </header>

  <main class="content">
    <div class="flex-c gap-2 mb-3">
      <h1>Progetti</h1>
      <button class="btn btn--primary ml-auto" onclick="openModal()">+ Nuovo progetto</button>
    </div>

    <!-- Stats dinamiche -->
    <div class="card mb-3">
      <div class="grid grid--3">
        <div class="stat"><div class="stat__num" id="stat-projects">—</div><div class="stat__label">Progetti</div></div>
        <div class="stat"><div class="stat__num" id="stat-open">—</div><div class="stat__label">Commenti aperti</div></div>
        <div class="stat"><div class="stat__num" id="stat-resolved">—</div><div class="stat__label">Risolti</div></div>
      </div>
    </div>

    <!-- Grid progetti generata dal DB -->
    <div class="grid grid--3" id="projects-grid">
      <div class="card" style="opacity:.4;padding:2rem;text-align:center;color:var(--tx-muted)">Caricamento…</div>
    </div>
  </main>
</div>

<!-- Modal nuovo progetto -->
<div class="modal-bg" id="modal-bg" onclick="if(e.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 style="margin:0">Nuovo progetto</h2>
    <div>
      <label>Nome</label>
      <input id="new-name" class="input" placeholder="Es. Aperto Studio">
    </div>
    <div>
      <label>URL del sito</label>
      <input id="new-url" class="input" placeholder="https://example.com">
    </div>
    <div class="flex-c gap-1" style="justify-content:flex-end">
      <button class="btn btn--ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn--primary" id="btn-create" onclick="createProject()">Crea</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
function openModal()  { document.getElementById('modal-bg').classList.add('open'); document.getElementById('new-name').focus(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.getElementById('new-name').value=''; document.getElementById('new-url').value=''; }

async function createProject() {
  const name = document.getElementById('new-name').value.trim();
  let   url  = document.getElementById('new-url').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = '…';
  const p = await API.post('projects', { name, url });
  closeModal();
  location.reload();
}

async function deleteProject(id, e) {
  e.preventDefault(); e.stopPropagation();
  if (!confirm('Eliminare questo progetto e tutti i suoi commenti?')) return;
  await API.delete('projects?id=' + id);
  location.reload();
}

function projectCard(p, pComments) {
  const pOpen = pComments.filter(c => c.status === 'active').length;
  const badge = pOpen > 0
    ? `<span class="project-card__badge badge badge--active">${pOpen} aper${pOpen===1?'to':'ti'}</span>`
    : `<span class="project-card__badge badge badge--resolved">✓ OK</span>`;
  return `
    <a href="/project?id=${p.id}" class="card project-card" style="position:relative">
      <button class="project-card__delete" onclick="deleteProject(${p.id},event)" title="Elimina">✕</button>
      <div class="project-card__thumb" style="background:linear-gradient(135deg,#f5f5f2,#eae9e4);flex-direction:column;gap:.4rem">
        <span style="font-family:var(--f-head);font-size:1rem;font-weight:700;color:#1a1a18;letter-spacing:-.02em;padding:0 1rem;text-align:center">${p.name}</span>
        <span style="font-size:.7rem;color:#888">${p.url.replace('https://','')}</span>
        ${badge}
      </div>
      <h3 class="mb-1">${p.name}</h3>
      <div class="label">${p.url.replace('https://','')}</div>
      <div class="flex-c gap-1 mt-2">
        <div class="avatar">MP</div>
        <span class="badge badge--count ml-auto">${pComments.length} commenti</span>
      </div>
    </a>`;
}

(async () => {
  const [projects, allComments] = await Promise.all([
    API.get('projects'),
    API.get('comments')
  ]);

  const open     = allComments.filter(c => c.status === 'active').length;
  const resolved = allComments.filter(c => c.status === 'resolved').length;
  document.getElementById('stat-projects').textContent  = projects.length;
  document.getElementById('stat-open').textContent      = open;
  document.getElementById('stat-resolved').textContent  = resolved;

  const grid = document.getElementById('projects-grid');
  if (!projects.length) {
    grid.innerHTML = '<div class="card" style="opacity:.4;padding:2rem;text-align:center;color:var(--tx-muted)">Nessun progetto — crea il primo</div>';
    return;
  }
  grid.innerHTML = projects.map(p => {
    const pComments = allComments.filter(c => c.project_id === p.id);
    return projectCard(p, pComments);
  }).join('');
})();
</script>
</body>
</html>
