<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width">
  <title>Precision</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .project-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    .comment-panel {
      overflow-y: auto;
      height: 100%;
      background: var(--s-low);
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: .75rem;
    }

    .preview-wrap {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      padding: 1rem 1.25rem;
      gap: .75rem;
    }

    .preview-toolbar {
      display: flex; align-items: center; gap: .75rem;
      flex-shrink: 0;
    }

    .mode-toggle {
      display: flex; background: var(--s-high);
      border-radius: var(--r-lg); padding: 3px; gap: 2px;
      flex-shrink: 0;
    }
    .mode-btn {
      padding: .3rem .9rem; border-radius: calc(var(--r-lg) - 2px);
      font-size: .78rem; font-weight: 500; cursor: pointer;
      border: none; background: transparent; color: var(--tx-sub);
      transition: all .15s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--s-white); color: var(--tx); box-shadow: var(--shadow); }

    /* Preview box — scroll container esterno */
    .preview-box {
      flex: 1;
      position: relative;
      border-radius: var(--r-xl);
      overflow-y: scroll;
      overflow-x: hidden;
      background: var(--s-highest);
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* Iframe: niente scroll interno, si espande all'altezza reale del sito */
    #preview-iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 200px;
      /* height impostata dinamicamente */
    }

    /* Loading state */
    #preview-loading {
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; height: 240px;
      font-size: .85rem; color: var(--tx-muted);
    }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--outline);
      border-top-color: var(--primary);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Overlay commenti: copre tutto il contenuto scrollabile */
    #comment-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      /* height impostata dinamicamente = scrollHeight */
      z-index: 10;
      cursor: crosshair;
      display: none;
    }
    body.mode-comment #comment-overlay { display: block; }

    /* Popup commento */
    .comment-popup {
      position: fixed; z-index: 100;
      width: 240px;
      background: rgba(247,249,251,.97);
      backdrop-filter: blur(12px);
      border-radius: var(--r-xl);
      box-shadow: 0 8px 24px rgba(25,28,30,.14);
      padding: 1rem;
      display: none;
    }
    .comment-popup.open { display: block; }
    .comment-popup textarea {
      width: 100%; height: 72px; resize: none;
      background: var(--s-highest); border: none;
      border-radius: var(--r-md); padding: .5rem;
      font-family: var(--f-body); font-size: .8rem;
      color: var(--tx); outline: none;
    }
    .comment-popup textarea:focus { box-shadow: 0 0 0 2px rgba(61,90,254,.3); }

    /* Pin */
    .pin {
      position: absolute; width: 24px; height: 24px;
      border-radius: 50%; background: var(--active-bg);
      border: 2px solid white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; color: white; font-weight: 700;
      box-shadow: var(--shadow); z-index: 15;
      transition: transform .15s;
      transform: translate(-50%, -50%);
    }
    .pin:hover { transform: translate(-50%,-50%) scale(1.2); }
    .pin.resolved { background: var(--primary); opacity: .5; }
  </style>
</head>
<body class="mode-navigate">
<div class="app" style="height:100vh;overflow:hidden">

  <header class="topbar">
    <a href="/" class="topbar__logo" style="text-decoration:none">Precision</a>
    <nav class="topbar__nav">
      <a href="/">← Dashboard</a>
      <span style="color:var(--tx);font-weight:500;margin-left:1rem;font-size:.85rem" id="project-name">…</span>
    </nav>
    <div class="flex-c gap-1">
      <a id="site-link" href="#" target="_blank" rel="noopener" class="btn btn--ghost btn--sm">↗ Apri sito</a>
      <a href="/archive" class="btn btn--ghost btn--sm">Archivio</a>
      <div class="topbar__avatar">MP</div>
    </div>
  </header>

  <div class="project-layout">

    <section class="preview-wrap">
      <div class="preview-toolbar">
        <h2 id="page-title" style="font-size:1rem;font-weight:600">—</h2>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-navigate" onclick="setMode('navigate')">🖱 Naviga</button>
          <button class="mode-btn" id="btn-comment" onclick="setMode('comment')">💬 Commenta</button>
        </div>
        <span class="badge badge--active ml-auto" id="open-count">…</span>
      </div>

      <div class="preview-box card" id="preview-box" style="padding:0">

        <!-- Loading indicator (visibile durante il caricamento del sito) -->
        <div id="preview-loading">
          <div class="spinner"></div>
          Caricamento sito…
        </div>

        <!-- Iframe del sito reale via proxy -->
        <iframe id="preview-iframe"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
          style="display:none"
          title="Site preview">
        </iframe>

        <!-- Overlay per catturare click in modalità commenta -->
        <div id="comment-overlay"></div>

        <!-- Popup commento -->
        <div class="comment-popup" id="comment-popup">
          <div style="font-size:.75rem;font-weight:600;color:var(--tx-muted);margin-bottom:.5rem">Nuovo commento</div>
          <textarea id="popup-input" placeholder="Descrivi il problema…"></textarea>
          <div class="flex-c gap-1 mt-2" style="justify-content:flex-end">
            <button class="btn btn--ghost btn--sm" onclick="cancelComment()">Annulla</button>
            <button class="btn btn--primary btn--sm" onclick="saveComment()">Invia</button>
          </div>
        </div>

      </div>
    </section>

    <aside class="comment-panel">
      <div class="sidebar__title">Commenti</div>
      <div class="comment-list" id="comment-list" style="display:flex;flex-direction:column;gap:.75rem">
        <div style="opacity:.4;text-align:center;padding:1rem;font-size:.8rem;color:var(--tx-muted)">Caricamento…</div>
      </div>
    </aside>
  </div>
</div>

<script src="app.js"></script>
<script>
const PROJECT_ID = parseInt(new URLSearchParams(location.search).get('id') || '1', 10);

const overlay = document.getElementById('comment-overlay');
const popup   = document.getElementById('comment-popup');
const box     = document.getElementById('preview-box');
const iframe  = document.getElementById('preview-iframe');

// ── MODE TOGGLE ──
function setMode(mode) {
  document.body.className = 'mode-' + mode;
  document.getElementById('btn-navigate').classList.toggle('active', mode === 'navigate');
  document.getElementById('btn-comment').classList.toggle('active', mode === 'comment');
  if (mode === 'comment') {
    // Copre tutta l'altezza scrollabile
    overlay.style.height = box.scrollHeight + 'px';
    // Disabilita eventi dentro l'iframe in modalità commenta
    iframe.style.pointerEvents = 'none';
  } else {
    iframe.style.pointerEvents = '';
    cancelComment();
  }
}

// ── CLICK-TO-COMMENT ──
let pendingPin = null;
let pinCount   = 0;

overlay.addEventListener('click', e => {
  const rect = box.getBoundingClientRect();
  const x    = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const yPx  = e.clientY - rect.top + box.scrollTop;
  const yPct = (yPx / box.scrollHeight * 100).toFixed(1);

  // Popup fisso nella viewport
  const px = Math.min(e.clientX + 10, window.innerWidth  - 260);
  const py = Math.min(e.clientY + 10, window.innerHeight - 190);
  popup.style.left = px + 'px';
  popup.style.top  = py + 'px';
  popup.classList.add('open');
  document.getElementById('popup-input').focus();

  if (pendingPin) pendingPin.remove();
  pendingPin = document.createElement('div');
  pendingPin.className = 'pin';
  pendingPin.style.cssText = `top:${yPct}%;left:${x}%;opacity:.5`;
  pendingPin.textContent = pinCount + 1;
  box.appendChild(pendingPin);
});

function cancelComment() {
  popup.classList.remove('open');
  if (pendingPin) { pendingPin.remove(); pendingPin = null; }
  document.getElementById('popup-input').value = '';
}

async function saveComment() {
  const txt = document.getElementById('popup-input').value.trim();
  if (!txt) return;
  const xPct = pendingPin ? parseFloat(pendingPin.style.left) : null;
  const yPct = pendingPin ? parseFloat(pendingPin.style.top)  : null;
  const saved = await API.post('comments', {
    project_id: PROJECT_ID,
    page: document.getElementById('page-title').textContent.trim(),
    author: 'Massimo P.', body: txt, x_pct: xPct, y_pct: yPct
  });
  if (pendingPin) {
    const domId = 'c' + saved.id;
    pendingPin.style.opacity = '1';
    pendingPin.id = 'pin-' + domId;
    pendingPin.dataset.comment = domId;
    pendingPin.addEventListener('click', () => highlightComment(domId));
    pendingPin = null; pinCount++;
  }
  renderThread(saved);
  updateCount();
  cancelComment();
  setMode('navigate');
}

// ── HIGHLIGHT ──
function highlightComment(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.style.outline = '2px solid var(--primary)';
  setTimeout(() => el.style.outline = '', 1500);
}

// ── RESOLVE ──
document.getElementById('comment-list').addEventListener('click', async e => {
  const btn = e.target.closest('[data-resolve]');
  if (!btn) return;
  const dbId = btn.dataset.dbid;
  if (dbId) await API.patch('comments?id=' + dbId, { status: 'resolved' });
  const thread = btn.closest('.thread');
  const badge  = thread.querySelector('.badge');
  if (badge) { badge.className = 'badge badge--resolved'; badge.textContent = 'Risolto'; }
  const pinEl = document.getElementById('pin-c' + dbId);
  if (pinEl) pinEl.classList.add('resolved');
  btn.remove();
  updateCount();
});

function updateCount() {
  const open = document.querySelectorAll('#comment-list .badge--active').length;
  document.getElementById('open-count').textContent = open + ' aper' + (open === 1 ? 'to' : 'ti');
}

// ── RENDER THREAD ──
function renderThread(c, prepend = true) {
  const domId = 'c' + c.id;
  const age = c.created_at
    ? new Date(c.created_at).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
    : 'adesso';
  const isActive = c.status === 'active';
  const t = document.createElement('div');
  t.className = 'card thread'; t.id = domId;
  t.innerHTML = `
    <div class="thread__header">
      <div class="avatar">${c.author.split(' ').map(w=>w[0]).join('')}</div>
      <span class="thread__author">${c.author}</span>
      <span class="meta ml-auto">${age}</span>
      <span class="badge badge--${isActive?'active':'resolved'}">${isActive?'Attivo':'Risolto'}</span>
    </div>
    <div class="thread__body">${c.body}</div>
    ${isActive ? `<div class="thread__actions"><button class="btn btn--ghost btn--sm" data-resolve data-dbid="${c.id}">✓ Risolvi</button></div>` : ''}`;
  const list = document.getElementById('comment-list');
  if (prepend) list.prepend(t); else list.append(t);

  if (c.x_pct != null && c.y_pct != null) {
    pinCount++;
    if (!document.getElementById('pin-' + domId)) {
      const pin = document.createElement('div');
      pin.className = 'pin' + (isActive ? '' : ' resolved');
      pin.id = 'pin-' + domId;
      pin.style.cssText = `top:${c.y_pct}%;left:${c.x_pct}%`;
      pin.dataset.comment = domId;
      pin.textContent = pinCount;
      pin.addEventListener('click', () => highlightComment(domId));
      box.appendChild(pin);
    }
  }
}

// ── INIT ──
(async () => {
  const [projects, comments] = await Promise.all([
    API.get('projects'),
    API.get('comments?project_id=' + PROJECT_ID)
  ]);

  const project = projects.find(p => p.id === PROJECT_ID) || projects[0];

  if (project) {
    const siteUrl = /^https?:\/\//.test(project.url) ? project.url : 'https://' + project.url;
    document.title = 'Precision — ' + project.name;
    document.getElementById('project-name').textContent = project.name;
    document.getElementById('page-title').textContent   = project.name;
    const lnk = document.getElementById('site-link');
    lnk.href = siteUrl;
    lnk.textContent = '↗ ' + siteUrl.replace('https://','').replace('http://','');

    // Carica sito reale tramite proxy (bypassa X-Frame-Options)
    iframe.onload = () => {
      document.getElementById('preview-loading').style.display = 'none';
      iframe.style.display = 'block';
      // Espande l'iframe all'altezza reale del sito (no scroll interno)
      try {
        const doc = iframe.contentWindow.document;
        const h = Math.max(doc.documentElement.scrollHeight, doc.body?.scrollHeight || 0, 600);
        iframe.style.height = h + 'px';
        overlay.style.height = h + 'px';
      } catch {
        iframe.style.height = '5000px';
        overlay.style.height = '5000px';
      }
    };
    iframe.onerror = () => {
      document.getElementById('preview-loading').innerHTML =
        `<div style="text-align:center;padding:2rem">
           <div style="font-size:1.5rem;margin-bottom:.5rem">⚠️</div>
           <div style="font-weight:600;color:var(--tx)">Preview non disponibile</div>
           <div style="font-size:.8rem;color:var(--tx-muted);margin:.5rem 0 1rem">Il sito non è accessibile in anteprima</div>
           <a href="${siteUrl}" target="_blank" class="btn btn--primary btn--sm">Apri ${siteUrl.replace('https://','').replace('http://','')} ↗</a>
         </div>`;
    };
    iframe.src = `/.netlify/functions/proxy?url=${encodeURIComponent(siteUrl)}`;
  }

  // Commenti
  const list = document.getElementById('comment-list');
  list.innerHTML = '';
  if (!comments.length) {
    list.innerHTML = '<div style="opacity:.4;text-align:center;padding:1rem;font-size:.8rem;color:var(--tx-muted)">Nessun commento</div>';
  } else {
    comments.forEach(c => renderThread(c, false));
  }
  updateCount();
})();
</script>
</body>
</html>
