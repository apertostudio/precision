<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width">
  <title>Precision — Aperto Studio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Layout a 3 colonne, occupa tutto lo schermo */
    .project-layout {
      display: grid;
      grid-template-columns: 220px 1fr 300px;
      height: calc(100vh - 52px);
      overflow: hidden;
    }
    /* Sidebar e panel scrollano internamente */
    .sidebar, .comment-panel {
      overflow-y: auto;
      height: 100%;
    }
    .comment-panel {
      background: var(--s-low);
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: .75rem;
    }

    /* Area centrale */
    .preview-wrap {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      padding: 1rem 1.25rem;
      gap: .75rem;
    }

    /* Barra superiore preview: titolo + mode toggle */
    .preview-toolbar {
      display: flex; align-items: center; gap: .75rem;
      flex-shrink: 0;
    }
    /* Toggle modale */
    .mode-toggle {
      display: flex; background: var(--s-high);
      border-radius: var(--r-lg); padding: 3px; gap: 2px;
      flex-shrink: 0;
    }
    .mode-btn {
      padding: .3rem .9rem; border-radius: calc(var(--r-lg) - 2px);
      font-size: .78rem; font-weight: 500; cursor: pointer;
      border: none; background: transparent; color: var(--tx-sub);
      transition: all .15s; white-space: nowrap;
    }
    .mode-btn.active {
      background: var(--s-white);
      color: var(--tx);
      box-shadow: var(--shadow);
    }

    /* Box preview: è lui stesso il container scrollabile */
    .preview-box {
      flex: 1;
      position: relative;
      border-radius: var(--r-xl);
      overflow-y: scroll;
      overflow-x: hidden;
      background: var(--s-highest);
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* Screenshot direttamente dentro la box */
    #screenshot-img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Overlay click-to-comment: copre tutto il contenuto scrollabile */
    #comment-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      z-index: 10;
      cursor: crosshair;
      display: none;
    }
    body.mode-comment #comment-overlay { display: block; }
    body.mode-navigate .preview-box   { cursor: default; }

    /* Popup commento inline che appare sul click */
    .comment-popup {
      position: absolute; z-index: 20;
      width: 240px;
      background: rgba(247,249,251,.95);
      backdrop-filter: blur(12px);
      border-radius: var(--r-xl);
      box-shadow: 0 8px 24px rgba(25,28,30,.12);
      padding: 1rem;
      display: none;
    }
    .comment-popup.open { display: block; }
    .comment-popup textarea {
      width: 100%; height: 72px; resize: none;
      background: var(--s-highest); border: none;
      border-radius: var(--r-md); padding: .5rem;
      font-family: var(--f-body); font-size: .8rem;
      color: var(--tx); outline: none;
    }
    .comment-popup textarea:focus { box-shadow: 0 0 0 2px rgba(61,90,254,.3); }

    /* Pin */
    .pin {
      position: absolute; width: 24px; height: 24px;
      border-radius: 50%; background: var(--active-bg);
      border: 2px solid white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; color: white; font-weight: 700;
      box-shadow: var(--shadow); z-index: 15;
      transition: transform .15s;
      transform: translate(-50%, -50%);
    }
    .pin:hover { transform: translate(-50%,-50%) scale(1.2); }
    .pin.resolved { background: var(--primary); opacity: .5; }
  </style>
</head>
<body class="mode-navigate">
<div class="app" style="height:100vh;overflow:hidden">

  <header class="topbar">
    <a href="/" class="topbar__logo" style="text-decoration:none">Precision</a>
    <nav class="topbar__nav">
      <a href="/">← Dashboard</a>
      <span style="color:var(--tx);font-weight:500;margin-left:1rem;font-size:.85rem">Aperto Studio</span>
    </nav>
    <div class="flex-c gap-1">
      <a href="https://aperto.studio" target="_blank" rel="noopener" class="btn btn--ghost btn--sm">↗ aperto.studio</a>
      <a href="/archive" class="btn btn--ghost btn--sm">Archivio</a>
      <div class="topbar__avatar">MP</div>
    </div>
  </header>

  <div class="project-layout">

    <!-- SIDEBAR navigazione sito -->
    <aside class="sidebar">
      <div class="sidebar__title">Struttura sito</div>
      <div class="nav-item active" data-section="home">
        <span class="nav-item__dot"></span> Home
      </div>
      <div class="nav-item" data-section="storie">
        <span class="nav-item__dot"></span> Storie
      </div>
      <div class="nav-item" data-section="studio">
        <span style="width:6px;height:6px;flex-shrink:0"></span> Studio
      </div>
      <div class="nav-item" data-section="direzione">
        <span style="width:6px;height:6px;flex-shrink:0"></span> Direzione
      </div>
      <div class="nav-item" data-section="note">
        <span style="width:6px;height:6px;flex-shrink:0"></span> Note
      </div>
      <div class="nav-item" data-section="contatti">
        <span class="nav-item__dot resolved"></span> Contatti
      </div>
    </aside>

    <!-- AREA PREVIEW -->
    <section class="preview-wrap">

      <!-- Toolbar: titolo + toggle + badge -->
      <div class="preview-toolbar">
        <h2 id="page-title">Home</h2>

        <!-- MODE TOGGLE -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-navigate" onclick="setMode('navigate')">🖱 Naviga</button>
          <button class="mode-btn" id="btn-comment" onclick="setMode('comment')">💬 Commenta</button>
        </div>

        <span class="badge badge--active ml-auto" id="open-count">…</span>
      </div>

      <!-- Preview box -->
      <div class="preview-box card" id="preview-box" style="padding:0">

        <!-- Overlay invisibile per catturare i click in modo commenta -->
        <div id="comment-overlay"></div>

        <!-- Screenshot direttamente scrollabile nella preview-box -->
        <img
          id="screenshot-img"
          src="https://api.microlink.io/?url=https://aperto.studio&screenshot=true&meta=false&embed=screenshot.url"
          alt="aperto.studio preview"
          onerror="this.outerHTML='<div style=\'padding:2rem;text-align:center;color:var(--tx-muted)\'>Preview non disponibile — <a href=\'https://aperto.studio\' target=\'_blank\'>apri il sito ↗</a></div>'"
        >

        <!-- Pin commenti esistenti -->
        <!-- pin generati dal DB -->

        <!-- Popup commento -->
        <div class="comment-popup" id="comment-popup">
          <div style="font-size:.75rem;font-weight:600;color:var(--tx-muted);margin-bottom:.5rem">Nuovo commento</div>
          <textarea id="popup-input" placeholder="Descrivi il problema…"></textarea>
          <div class="flex-c gap-1 mt-2" style="justify-content:flex-end">
            <button class="btn btn--ghost btn--sm" onclick="cancelComment()">Annulla</button>
            <button class="btn btn--primary btn--sm" onclick="saveComment()">Invia</button>
          </div>
        </div>

      </div>
    </section>

    <!-- PANEL COMMENTI -->
    <aside class="comment-panel">
      <div class="sidebar__title">Commenti</div>
      <div class="comment-list" id="comment-list" style="display:flex;flex-direction:column;gap:.75rem">
        <div style="opacity:.4;text-align:center;padding:1rem;font-size:.8rem;color:var(--tx-muted)">Caricamento…</div>
      </div>
    </aside>
  </div>
</div>

<script>
// ── MODE TOGGLE ──
function setMode(mode) {
  document.body.className = 'mode-' + mode;
  document.getElementById('btn-navigate').classList.toggle('active', mode === 'navigate');
  document.getElementById('btn-comment').classList.toggle('active', mode === 'comment');
  // Chiudi popup se si esce dal modo commenta
  if (mode === 'navigate') cancelComment();
}

// ── CLICK-TO-COMMENT ──
let pendingPin = null;
let pinCount = 0;
const overlay = document.getElementById('comment-overlay');
const popup   = document.getElementById('comment-popup');
const box     = document.getElementById('preview-box');

overlay.addEventListener('click', e => {
  const rect = box.getBoundingClientRect();
  // x relativo alla larghezza, y tiene conto dello scroll
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const yPx = e.clientY - rect.top + box.scrollTop;
  const yPct = (yPx / box.scrollHeight * 100).toFixed(1);

  // Popup fisso nella viewport (sticky al viewport, non al contenuto)
  const popupX = Math.min(parseFloat(x) + 2, 60);
  const popupY = Math.min(e.clientY - rect.top + 8, rect.height - 180);
  popup.style.left = popupX + '%';
  popup.style.top  = popupY + 'px';
  popup.classList.add('open');
  document.getElementById('popup-input').focus();

  // Pin ancorato al contenuto (posizione assoluta rispetto all'immagine)
  if (pendingPin) pendingPin.remove();
  pendingPin = document.createElement('div');
  pendingPin.className = 'pin';
  pendingPin.style.cssText = `top:${yPct}%;left:${x}%;opacity:.5`;
  pendingPin.textContent = pinCount + 1;
  box.appendChild(pendingPin);
});

function cancelComment() {
  popup.classList.remove('open');
  if (pendingPin) { pendingPin.remove(); pendingPin = null; }
  document.getElementById('popup-input').value = '';
}

async function saveComment() {
  const txt = document.getElementById('popup-input').value.trim();
  if (!txt) return;

  // Salva nel DB
  const currentPage = document.getElementById('page-title').textContent.trim();
  const xPct = pendingPin ? parseFloat(pendingPin.style.left) : null;
  const yPct = pendingPin ? parseFloat(pendingPin.style.top)  : null;
  const saved = await API.post('comments', {
    project_id: PROJECT_ID, page: currentPage,
    author: 'Massimo P.', body: txt, x_pct: xPct, y_pct: yPct
  });

  // Rendi pin permanente
  if (pendingPin) {
    const domId = 'c' + saved.id;
    pendingPin.style.opacity = '1';
    pendingPin.id = 'pin-' + domId;
    pendingPin.dataset.comment = domId;
    pendingPin.addEventListener('click', () => highlightComment(domId));
    pendingPin = null;
    pinCount++;
  }

  // Aggiungi thread nel panel
  renderThread(saved);
  updateCount();
  cancelComment();
  setMode('navigate');
}

// ── HIGHLIGHT commento da pin ──
function highlightComment(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.style.outline = '2px solid var(--primary)';
  setTimeout(() => el.style.outline = '', 1500);
}

// Pin esistenti → highlight
document.querySelectorAll('.pin[data-comment]').forEach(pin => {
  pin.addEventListener('click', () => highlightComment(pin.dataset.comment));
});

// ── RESOLVE → salva nel DB ──
document.getElementById('comment-list').addEventListener('click', async e => {
  const btn = e.target.closest('[data-resolve]');
  if (!btn) return;
  const dbId = btn.dataset.dbid;
  if (dbId) await API.patch('comments?id=' + dbId, { status: 'resolved' });
  const thread = btn.closest('.thread');
  const badge  = thread.querySelector('.badge');
  if (badge) { badge.className = 'badge badge--resolved'; badge.textContent = 'Risolto'; }
  const pinId = btn.dataset.pin;
  if (pinId) { const pin = document.getElementById(pinId); if (pin) pin.classList.add('resolved'); }
  btn.remove();
  updateCount();
});

function updateCount() {
  const open = document.querySelectorAll('#comment-list .badge--active').length;
  document.getElementById('open-count').textContent = open + ' aper' + (open === 1 ? 'to' : 'ti');
}

// ── RENDER THREAD ──
function renderThread(c, prepend = true) {
  const domId = 'c' + c.id;
  const age = c.created_at ? new Date(c.created_at).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'adesso';
  const isActive = c.status === 'active';
  const t = document.createElement('div');
  t.className = 'card thread';
  t.id = domId;
  t.innerHTML = `
    <div class="thread__header">
      <div class="avatar">${c.author.split(' ').map(w=>w[0]).join('')}</div>
      <span class="thread__author">${c.author}</span>
      <span class="meta ml-auto">${age}</span>
      <span class="badge badge--${isActive?'active':'resolved'}">${isActive?'Attivo':'Risolto'}</span>
    </div>
    <div class="thread__body">${c.body}</div>
    ${isActive ? `<div class="thread__actions"><button class="btn btn--ghost btn--sm" data-resolve data-pin="pin-${domId}" data-dbid="${c.id}">✓ Risolvi</button></div>` : ''}`;
  const list = document.getElementById('comment-list');
  if (prepend) list.prepend(t); else list.append(t);

  // Pin se ha coordinate
  if (c.x_pct && c.y_pct) {
    pinCount++;
    const existing = document.getElementById('pin-' + domId);
    if (!existing) {
      const pin = document.createElement('div');
      pin.className = 'pin' + (isActive ? '' : ' resolved');
      pin.id = 'pin-' + domId;
      pin.style.cssText = `top:${c.y_pct}%;left:${c.x_pct}%`;
      pin.dataset.comment = domId;
      pin.textContent = pinCount;
      pin.addEventListener('click', () => highlightComment(domId));
      box.appendChild(pin);
    }
  }
}

// ── CARICA COMMENTI DAL DB ──
const PROJECT_ID = new URLSearchParams(location.search).get('id') || 1;
(async () => {
  const comments = await API.get('comments?project_id=' + PROJECT_ID);
  document.getElementById('comment-list').innerHTML = '';
  if (comments.length === 0) {
    document.getElementById('comment-list').innerHTML = '<div style="opacity:.4;text-align:center;padding:1rem;font-size:.8rem;color:var(--tx-muted)">Nessun commento</div>';
  } else {
    comments.forEach(c => renderThread(c, false));
  }
  updateCount();
})();

// ── SIDEBAR navigazione sezioni ──
document.querySelectorAll('.nav-item[data-section]').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('page-title').textContent = item.textContent.trim();
    // Scroll nella screenshot se immagine caricata, altrimenti apri link
    const img = document.getElementById('screenshot-img');
    if (!img || !img.complete || img.naturalHeight === 0) {
      window.open('https://aperto.studio/#' + item.dataset.section, '_blank');
    }
  });
});
</script>
<script src="app.js"></script>
</body>
</html>
